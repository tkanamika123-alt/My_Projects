<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f4f4;
    }

    /* 🔹 NAVBAR */
    .navbar {
      display: flex;
      flex-direction: column;
      background: #333;
    }

    .navbar a {
      color: white;
      padding: 12px;
      text-align: center;
      text-decoration: none;
    }

    .navbar a:hover {
      background: #575757;
    }

    /* 🔹 HEADER */
    .header {
      text-align: center;
      padding: 40px;
      background: #4CAF50;
      color: white;
    }

    /* 🔹 FLEX CONTAINER */
    .container {
      display: flex;
      flex-wrap: wrap;
      padding: 10px;
    }

    .box {
      background: white;
      margin: 10px;
      padding: 20px;
      flex: 1 1 100%; /* Mobile default */
      border-radius: 8px;
      text-align: center;
    }

    /* 🔹 TABLET VIEW */
    @media (min-width: 768px) {
      .navbar {
        flex-direction: row;
        justify-content: space-around;
      }

      .box {
        flex: 1 1 45%;
      }
    }

    /* 🔹 DESKTOP VIEW */
    @media (min-width: 1024px) {
      .box {
        flex: 1 1 30%;
      }
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>

  <!-- HEADER -->
  <div class="header">
    <h1>Responsive Web Page</h1>
    <p>Mobile | Tablet | Desktop</p>
  </div>

  <!-- CONTENT -->
  <div class="container">
    <div class="box">
        <img src="cod.jpg" width="150">
        <h3>Box1</h3>
        <p>Responsive box</p>
      </div>

    <div class="box">
          <img src="cod.jpg" width="150">
          <h3>Box2</h3>
          <p>Mobile, Desktop, Tablet View</p>
      </div>

    <div class="box">
          <img src="cod.jpg" width="150">
          <h3>Box3</h3>
          <p>Media Queries</p>
    </div>
  </div>

   
</body>
</html>
