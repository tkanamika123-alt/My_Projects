<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Mini Project</title>
    <style>
        /* General Styles */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }

        /* Hero Section */
        .hero {
            background-color: #8ecae6;
            padding: 50px 20px;
        }

        .hero img {
            max-width: 300px;
            height: auto;
            margin-bottom: 20px;
        }

        .hero h1 {
            margin: 10px 0;
            font-size: 2rem;
        }

        .hero p {
            color: #333;
            font-style: italic;
        }

        /* Services Section */
        .services-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 40px 20px;
        }

        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            width: 250px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            background-color: #0077b6; /* Placeholder color */
        }

        .card h3 {
            margin: 15px 0 5px;
        }

        .card p {
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>welcome to my website</h1>
        <p>This is Responsive Mini project.</p>
    </section>

    <section class="services-container">
        
        <div class="card">
            <img src="cod.jpg" width="150">
            <h3>service1</h3>
            <p>web design</p>
        </div>

        <div class="card">
            <img src="cod.jpg" width="150">
            <h3>service2</h3>
            <p>Responsive Layout</p>
        </div>

        <div class="card">
            <img src="cod.jpg" width="150">
            <h3>service3</h3>
            <p>Modern UI</p>
        </div>

    </section>

</body>
</html>
