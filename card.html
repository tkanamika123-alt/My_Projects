<!DOCTYPE html>
<html>
<head>
  <title>Card Design</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    /* CARD */
    .card {
      width: 300px;

      /* BOX MODEL PARTS */
      margin: 20px;              /* OUTSIDE SPACE */
      padding: 20px;             /* INSIDE SPACE */
      border: 2px solid #ddd;    /* BORDER */
      border-radius: 10px;       /* rounded corners */

      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h2 {
      margin-top: 15px;
    }

    .card p {
      margin-top: 10px;
      color: #555;
    }

    .card button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .card button:hover {
      background: #0056b3;
    }
  </style>

</head>
<body>

  <div class="card">
    <img src="cod.jpg" width="150">

    <h2>Product Title</h2>
    <p>This is a simple card layout using the CSS box model with proper spacing.</p>

    <button>Read me</button>
  </div>

</body>
</html>
