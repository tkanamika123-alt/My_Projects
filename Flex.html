<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            text-align: center;
        }

        h1 {
            margin-bottom: 5px;
        }

        .description {
            margin-bottom: 20px;
            color: #333;
        }

        /* The blue-green background container */
        .flex-container {
            background-color: #a2d2df;
            padding: 40px 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
            min-height: 300px;
        }

        /* Individual Card Styling */
        .card {
            background-color: white;
            border-radius: 12px;
            padding: 15px;
            width: 250px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            border-radius: 8px;
            display: block;
        }

        .card h3 {
            margin: 15px 0 5px 0;
            font-size: 1.1rem;
        }

        .card p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>Flexbox example</h1>
    <p class="description">This layout uses flex-direction, justify-content, and align-items.</p>

    <div class="flex-container">
        <div class="card">
            <img src="cod.jpg" width="150">
            <h3>card1</h3>
            <p>This is image card</p>
        </div>

        <div class="card">
            <img src="cod.jpg" width="150">
            <h3>card2</h3>
            <p>This is image card</p>
        </div>

        <div class="card">
            <img src="cod.jpg" width="150">
            <h3>card3</h3>
            <p>This is image card</p>
        </div>
    </div>

</body>
</html>
